<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/styles.css" />
    <title>Paleta de colores</title>
  </head>
  <body>
    <!-- Titulo de la pagina -->
    <header>
      <h1 class="titulo">Generador de paletas interactivo</h1>
    </header>
    <main class="contenedor">
      <!--Sidebar-->
      <aside class="sidebar">
        <!-- Botones selector de colores -->
        <section>
          <p>Cantidad de colores:</p>
          <button id="6colores">6 colores</button>
          <button id="8colores">8 colores</button>
          <button id="9colores">9 colores</button>
        </section>
      </aside>
      <!-- Seccion paletas de colores -->
      <section id="paletas" class="paletasDinamicas">
        <h2 class="subtitulo">
          Creá combinaciones de colores para tus proyectos visuales
        </h2>
        <p id="mensaje"></p>

        <button id="generarPaleta" class="btnGenerarPaleta">
          Generar paleta
        </button>

        <p id="copiarCodigo"></p>

        <div id="paleta" class="paleta"></div>
      </section>
    </main>
    <footer>
      <p>Generador de paletas interactivo &copy 2026 Colorfly Studio</p>
    </footer>
    <script src="./js/script.js"></script>
  </body>
</html>
