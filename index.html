<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Paleta de colores</title>
  </head>
  <body>
    <!-- Titulo de la pagina -->
    <header>
      <h1 class="titulo">Generador de paletas interactivo</h1>
    </header>
    <main class="contenedor">
      <!--Sidebar-->
      <aside class="sidebar">
        <!-- Botones selector de colores -->
        <section>
          <p>Cantidad de colores:</p>
          <button>6 colores</button>
          <button>8 colores</button>
          <button>9 colores</button>
        </section>
      </aside>
      <!-- Boton generar paleta -->
      <section>
        <h2 class="subtitulo">
          Creá combinaciones de colores para tus proyectos visuales
        </h2>
        <button class="btnGenerarPaleta">Generar paleta</button>
      </section>
      <!-- Seccion paletas de colores -->
      <section class="paletas"></section>
    </main>
    <script src="./script.js"></script>
  </body>
  <footer>
    <p>Generador de paletas interactivo &copy 2026 Colorfly Studio</p>
  </footer>
</html>
